<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Control de gastos para parejas" />
    <meta name="theme-color" content="#eab308" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Nido - Control de Gastos</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Liquid Glass Refraction Filter -->
    <svg style="visibility: hidden; position: absolute;" width="0" height="0">
      <filter id="liquid-glass-filter" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="2" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
