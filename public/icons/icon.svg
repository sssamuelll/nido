<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Nido">
  <defs>
    <!-- pine -> clay, the warm "hogar cálido" brand gradient (~150deg) -->
    <linearGradient id="nido" x1="0.08" y1="0" x2="0.92" y2="1">
      <stop offset="0" stop-color="#3D6B52"/>
      <stop offset="1" stop-color="#BC5739"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#nido)"/>
  <text x="256" y="350" text-anchor="middle"
        font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
        font-size="330" fill="#FFFFFF">n</text>
</svg>
